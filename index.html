* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 32px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #242424;
  background: #f4f2ef;
}

header, main, .global-output-box, .note {
  max-width: 1220px;
  margin-left: auto;
  margin-right: auto;
}

h1 {
  margin: 0 0 10px;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.12;
}

.lead {
  margin: 0 0 28px;
  color: #666;
  line-height: 1.8;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.card {
  display: grid;
  grid-template-columns: minmax(420px, 1.35fr) minmax(300px, .85fr);
  gap: 22px;
  padding: 20px;
  background: #fff;
  border: 1px solid #ddd9d2;
  border-radius: 24px;
  box-shadow: 0 14px 34px rgba(34, 28, 20, .08);
}

.mockup {
  min-height: 560px;
  display: grid;
  place-items: center;
  border-radius: 20px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.78), rgba(255,255,255,.16)),
    #ece8df;
  overflow: hidden;
}

.shirt {
  position: relative;
  width: min(98%, 470px);
  aspect-ratio: 1 / 1;
  filter: drop-shadow(0 22px 26px rgba(0,0,0,.18));
}

.shirt-color,
.shirt::after {
  position: absolute;
  inset: 0;
  -webkit-mask: var(--asset-shirt) center / contain no-repeat;
  mask: var(--asset-shirt) center / contain no-repeat;
}

.shirt-color { background: var(--body); }

.shirt::after {
  content: "";
  background: linear-gradient(90deg, rgba(255,255,255,.18), rgba(0,0,0,.06) 52%, rgba(255,255,255,.1));
  opacity: .35;
  mix-blend-mode: multiply;
  pointer-events: none;
}

.logo {
  position: absolute;
  left: var(--logo-left, 50%);
  top: var(--logo-top, 25%);
  width: var(--logo-size, 34%);
  aspect-ratio: 1 / 1;
  transform: translateX(-50%) rotate(var(--logo-rotate, -1deg));
}

.layer {
  position: absolute;
  inset: 0;
  -webkit-mask-position: center;
  mask-position: center;
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
}

.layer.frame { background: var(--frame); -webkit-mask-image: var(--asset-frame); mask-image: var(--asset-frame); }
.layer.leaf { background: var(--leaf); -webkit-mask-image: var(--asset-leaf); mask-image: var(--asset-leaf); }
.layer.flower { background: var(--flower); -webkit-mask-image: var(--asset-flower); mask-image: var(--asset-flower); }
.layer.text { background: var(--text); -webkit-mask-image: var(--asset-text); mask-image: var(--asset-text); }

.card.hide-frame .layer.frame,
.card.hide-leaf .layer.leaf,
.card.hide-flower .layer.flower,
.card.hide-text .layer.text {
  display: none;
}

.info { padding: 8px 2px; }

h2 {
  margin: 0 0 8px;

  line-height: 1.2;
}

.unit-caption {

}

.controls {

.controls-title {

}

.control-row {

}

.control-row label {

}

.control-row input[type="color"] {
  width: 44px;
  height: 34px;
  padding: 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;

}

.control-row input[type="text"] {
  width: 100%;
  min-width: 0;

  padding: 6px 8px;

.layer-toggle-box {

.layer-toggle-title {

.layer-toggle-grid {

  </div>

<script>
(function () {
  const variableLabels = {
    "--body": "ボディ",
    "--text": "文字",
    "--leaf": "葉",
    "--flower": "花",
    "--frame": "枠"
  };

  const positionDefaults = {
    "--logo-left": 50,
    "--logo-top": 25,
    "--logo-size": 34,
    "--logo-rotate": -1
  };

  function normalizeHex(value) {
    const raw = String(value || "").trim();
    if (/^#[0-9a-fA-F]{6}$/.test(raw)) return raw.toUpperCase();
    if (/^[0-9a-fA-F]{6}$/.test(raw)) return ("#" + raw).toUpperCase();
    return null;
  }

  function hexToRgb(hex) {
    const h = hex.replace("#", "");
    return [
      parseInt(h.slice(0, 2), 16),
      parseInt(h.slice(2, 4), 16),
      parseInt(h.slice(4, 6), 16)
    ];
  }

  function setColor(card, cssVar, hex) {
    card.style.setProperty(cssVar, hex);
    const colorInput = card.querySelector(`input[type="color"][data-var="${cssVar}"]`);
    const textInput = card.querySelector(`input[type="text"][data-var-text="${cssVar}"]`);
    if (colorInput) colorInput.value = hex;
    if (textInput) textInput.value = hex;
  }

  function getColor(card, cssVar) {
    return normalizeHex(card.style.getPropertyValue(cssVar).trim()) || "#000000";
  }

  function setPosition(card, cssVar, value) {
    const units = { "--logo-left": "%", "--logo-top": "%", "--logo-size": "%", "--logo-rotate": "deg" };
    const numericValue = Number(value);
    const safeValue = Number.isFinite(numericValue) ? numericValue : positionDefaults[cssVar];
    card.style.setProperty(cssVar, `${safeValue}${units[cssVar]}`);
  }

  function formatCardSettings(card) {
    const title = card.querySelector("h2")?.textContent?.trim() || "T-shirt";
    const lines = [`[${title}]`];
    Object.entries(variableLabels).forEach(([cssVar, label]) => {
      const hex = getColor(card, cssVar);
      const rgb = hexToRgb(hex);
      lines.push(`${label}: ${hex} / RGB(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`);
    });
    return lines.join("\n");
  }

  function formatAllSettings() {
    return Array.from(document.querySelectorAll(".card")).map(formatCardSettings).join("\n\n");
  }

  document.querySelectorAll(".card").forEach((card) => {
    const initialColors = {};
    Object.keys(variableLabels).forEach((cssVar) => {
      initialColors[cssVar] = getColor(card, cssVar);
      setColor(card, cssVar, initialColors[cssVar]);
    });
    Object.entries(positionDefaults).forEach(([cssVar, value]) => setPosition(card, cssVar, value));

    card.querySelectorAll('input[type="color"][data-var]').forEach((input) => {
      input.addEventListener("input", () => setColor(card, input.dataset.var, input.value.toUpperCase()));
    });

    card.querySelectorAll('input[type="text"][data-var-text]').forEach((input) => {
      input.addEventListener("change", () => {
        const hex = normalizeHex(input.value);
        if (!hex) {
          input.value = getColor(card, input.dataset.varText);
          return;
        }
        setColor(card, input.dataset.varText, hex);
      });
    });

    card.querySelectorAll(".toggle-layer").forEach((toggle) => {
      toggle.addEventListener("change", () => {
        card.classList.toggle(`hide-${toggle.dataset.layer}`, !toggle.checked);
      });
    });

    const reset = card.querySelector(".reset-palette");
    if (reset) {
      reset.addEventListener("click", () => {
        Object.keys(initialColors).forEach((cssVar) => setColor(card, cssVar, initialColors[cssVar]));
        card.querySelectorAll(".toggle-layer").forEach((toggle) => {
          toggle.checked = true;
          card.classList.remove(`hide-${toggle.dataset.layer}`);
        });
        const output = card.querySelector(".copy-output");
        if (output) output.style.display = "none";
      });
    }

    const copy = card.querySelector(".copy-palette");
    if (copy) {
      copy.addEventListener("click", async () => {
        const output = card.querySelector(".copy-output");
        const text = formatCardSettings(card);
        if (output) {
          output.value = text;
          output.style.display = "block";
          output.focus();
          output.select();
        }
        try {
          await navigator.clipboard.writeText(text);
          copy.textContent = "コピーしました";
          setTimeout(() => { copy.textContent = "設定情報をコピー"; }, 1400);
        } catch (error) {
          copy.textContent = "下の欄からコピーしてください";
          setTimeout(() => { copy.textContent = "設定情報をコピー"; }, 1800);
        }
      });
    }
  });

  const globalOutput = document.getElementById("global-output");
  const showAll = document.getElementById("show-all-settings");
  const copyAll = document.getElementById("copy-all-settings");

  function showAllSettings() {
    if (!globalOutput) return "";
    const text = formatAllSettings();
    globalOutput.value = text;
    globalOutput.style.display = "block";
    globalOutput.focus();
    globalOutput.select();
    return text;
  }

  if (showAll) showAll.addEventListener("click", showAllSettings);

  if (copyAll) {
    copyAll.addEventListener("click", async () => {
      const text = showAllSettings();
      try {
        await navigator.clipboard.writeText(text);
        copyAll.textContent = "コピーしました";
        setTimeout(() => { copyAll.textContent = "全設定をクリップボードにコピー"; }, 1400);
      } catch (error) {
        copyAll.textContent = "下の欄からコピーしてください";
        setTimeout(() => { copyAll.textContent = "全設定をクリップボードにコピー"; }, 1800);
      }
    });
  }
})();
</script>
